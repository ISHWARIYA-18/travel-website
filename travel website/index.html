<!DOCTYPE html>
<html>
<head>
    <title>Dream Travel Board</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
        }

        header {
            padding: 40px;
            color: white;
        }

        h1 {
            font-size: 40px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 30px;
        }

        .card {
            background: white;
            width: 250px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            margin: 15px 0 5px 0;
        }

        .card p {
            padding: 0 15px 15px 15px;
            font-size: 14px;
            color: #555;
        }

        footer {
            padding: 15px;
            background: rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<header>
    <h1>🌍Places To Visit </h1>
    <p> travel makes our inner child happy!:) </p>
    <h3 id="greet"></h3>

    <button onclick="changeColor()">Change Theme</button>
</header>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34" alt="Paris">
        <h3>Paris</h3>
        <p>The city of lights and vibe.</p>
        <button onclick="showPlace('PARIS')">Explore</button>
    </div>

    <div class="card">
        <img src="maldives.jpeg" alt="Maldives"
        <h3>Maldives</h3>
        <p>Crystal clear water and peaceful beach view.</p>
        <button onclick="showPlace('MALDIVES')">Explore</button>
    </div>

    <div class="card">
        <img src=https://assets.cntraveller.in/photos/63f5b2d472cc3e2749d663f5/16:9/w_1920%2Cc_limit/GettyImages-1145042281.jpeg" alt="Bali">
        <h3>Bali</h3>
        <p>Beautiful nature and tropical vibes.</p>
        <button onclick="showPlace('BALI')">Explore</button>
    </div>

</div>
<p id="info"></p>

<footer>
    © 2026  Dream Travel Board | Designed by Me
</footer>
<script src="script.js"></script>
</body>
</html>
