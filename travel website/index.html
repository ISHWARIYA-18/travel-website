            font-size: 40px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 30px;
        }

        .card {
            background: white;
            width: 250px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            margin: 15px 0 5px 0;
        }

        .card p {
            padding: 0 15px 15px 15px;
            font-size: 14px;
            color: #555;
        }

        footer {
            padding: 15px;
            background: rgba(0,0,0,0.1);
        }
    </style>
